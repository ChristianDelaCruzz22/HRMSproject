<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS | Set New Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./Css/index.css"> <link rel="icon" type="image/png" href="Icon2.png">
</head>
<body>
    <div id="toast-container"></div>

    <div class="split-container">
        <div class="branding-section">
            <div class="branding-content">
                <img src="Icon2.png" alt="Logo" class="brand-logo">
                <h1 class="brand-title">Secure Your <br><span>Account.</span></h1>
                <p class="brand-tagline">Enter your new secure password below to regain access to your HR portal.</p>
                <div class="badge"><span class="pulse"></span> Security Active</div>
            </div>
        </div>

        <div class="login-section">
            <div class="login-card">
                <div class="login-header">
                    <h2>New Password</h2>
                    <p>Please enter your new credentials.</p>
                </div>

                <form id="updatePasswordForm">
                    <div class="input-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" placeholder="Min. 6 characters" required>
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Repeat password" required>
                    </div>
                    <button type="submit" class="btn-primary" id="updateBtn">Update Password</button>
                </form>

                <div class="login-footer">
                    <div class="copyright-notice">© 2026 HUMAN RESOURCE MANAGEMENT SYSTEM</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./Js/update-password.js"></script>
</body>
</html>
